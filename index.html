<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Second Challenge</title>

<!-- AdSense verification -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6860775768496575"
     crossorigin="anonymous"></script>

<style>
:root {
  --bg-dark: linear-gradient(160deg, #0a0a0a, #1a1a1a);
  --bg-light: linear-gradient(160deg, #ffffff, #ececec);
  --text-dark: #f5f5f5;
  --text-light: #111;
}

body {
  margin: 0;
  font-family: -apple-system, system-ui;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg-dark);
  color: var(--text-dark);
  transition: 0.3s;
}

.light {
  background: var(--bg-light);
  color: var(--text-light);
}

.card {
  backdrop-filter: blur(45px);
  background: rgba(30,30,30,0.5);
  border-radius: 28px;
  padding: 32px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.06);
}

.light .card {
  background: rgba(255,255,255,0.85);
}

button {
  padding: 14px;
  border-radius: 14px;
  border: none;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: rgba(255,255,255,0.12);
}

.light .primary {
  background: #f0f0f0;
  color: #111;
}

.secondary {
  background: transparent;
  border: 1px solid rgba(150,150,150,0.3);
}

#result {
  font-size: 28px;
  margin-top: 20px;
  min-height: 50px;
}

.small {
  font-size: 13px;
  opacity: 0.7;
}

footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
}

.toggle {
  position: absolute;
  top: 15px;
  right: 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌓</div>

<div class="card">

<h2>⏱ 1 Second Challenge</h2>
<p class="small">Tap twice → hit exactly 1.000s</p>

<button class="primary" onclick="tap()">START / STOP</button>

<div id="result"></div>
<div id="actions"></div>

<p class="small" id="attemptsUI"></p>
<p class="small" id="best"></p>

</div>

<!-- ABOUT -->
<div style="max-width:420px;margin-top:20px;font-size:13px;opacity:0.7;text-align:center;">
  <p>This is a simple timing challenge where you try to stop exactly at 1.000 seconds.</p>
  <p>It tests your focus, timing, and reaction skills.</p>
</div>

<footer>
  <a href="#" onclick="showPolicy()">Privacy Policy</a>
</footer>

<script>
let startTime = 0;
let running = false;
let cooldown = false;

/* DAILY ATTEMPTS */
let today = new Date().toDateString();
let storedDay = localStorage.getItem("day");
let attempts = parseInt(localStorage.getItem("attempts") || 0);

if (storedDay !== today) {
  attempts = 0;
  localStorage.setItem("day", today);
  localStorage.setItem("attempts", attempts);
}

let best = localStorage.getItem("best");

updateUI();

/* THEME */
function toggleTheme() {
  document.body.classList.toggle("light");
}

/* MAIN GAME */
function tap() {
  if (cooldown) return;

  if (attempts >= 5) {
    startCooldown();
    return;
  }

  if (!running) {
    startTime = Date.now();
    running = true;
    setResult("Go...");
  } else {
    let diff = (Date.now() - startTime) / 1000;
    running = false;

    attempts++;
    localStorage.setItem("attempts", attempts);

    evaluate(diff);
  }
}

function evaluate(diff) {
  let rounded = diff.toFixed(3);
  let message = `You: ${rounded}s`;

  if (rounded === "1.000") message += " 🔥 PERFECT";
  else if (Math.abs(1 - rounded) < 0.01) message += " 😭 0.01 away";
  else if (Math.abs(1 - rounded) < 0.02) message += " 😳 so close";

  if (!best || Math.abs(1-rounded) < Math.abs(1-best)) {
    best = rounded;
    localStorage.setItem("best", best);
  }

  setResult(message);

  document.getElementById("actions").innerHTML = `
    <button class="secondary" onclick="share('${rounded}')">Share</button>
    <button class="primary" onclick="tap()">Try Again</button>
    ${rounded === "1.000" ? `<p class="small">this is rare 👀</p>` : ""}
  `;

  updateUI();
}

/* SHARE */
function share(score) {
  let text = `${score}s 😳

can you beat me?
${location.href}`;

  if (navigator.share) {
    navigator.share({ text });
  } else {
    navigator.clipboard.writeText(text);
    alert("Copied!");
  }
}

/* COOLDOWN INSTEAD OF ADS */
function startCooldown() {
  cooldown = true;

  let timeLeft = 10;
  setResult("No attempts left");

  let interval = setInterval(() => {
    document.getElementById("attemptsUI").innerText =
      `Try again in ${timeLeft}s`;

    timeLeft--;

    if (timeLeft < 0) {
      clearInterval(interval);
      attempts = 0;
      cooldown = false;
      localStorage.setItem("attempts", attempts);
      updateUI();
      setResult("Ready again!");
    }
  }, 1000);
}

/* UI */
function updateUI() {
  let remaining = Math.max(0, 5 - attempts);

  document.getElementById("attemptsUI").innerText =
    `${remaining} attempts left today`;

  document.getElementById("best").innerText =
    best ? "🏆 Best: " + best + "s" : "";
}

function setResult(text) {
  document.getElementById("result").innerText = text;
}

/* PRIVACY */
function showPolicy() {
  document.body.innerHTML = `
    <div style="padding:20px;font-family:sans-serif;">
      <h2>Privacy Policy</h2>
      <p>This site may use cookies and Google AdSense for ads.</p>
      <p>No personal data is collected directly.</p>
      <br>
      <button onclick="location.reload()">Back</button>
    </div>
  `;
}
</script>

</body>
</html>
