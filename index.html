<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Second Challenge</title>


<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6860775768496575"
     crossorigin="anonymous"></script>


<style>
:root {
  --bg-dark: linear-gradient(160deg, #0a0a0a, #1a1a1a);
  --bg-light: linear-gradient(160deg, #ffffff, #ececec);
  --text-dark: #f5f5f5;
  --text-light: #111;
}

body {
  margin: 0;
  font-family: -apple-system, system-ui;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg-dark);
  color: var(--text-dark);
}

.light {
  background: var(--bg-light);
  color: var(--text-light);
}

.card {
  backdrop-filter: blur(45px);
  background: rgba(30,30,30,0.5);
  border-radius: 28px;
  padding: 32px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.06);
}

.light .card {
  background: rgba(255,255,255,0.85);
}

button {
  padding: 14px;
  border-radius: 14px;
  border: none;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: rgba(255,255,255,0.12);
}

.light .primary {
  background: #f0f0f0;
  color: #111;
}

.secondary {
  background: transparent;
  border: 1px solid rgba(150,150,150,0.3);
}

#result {
  font-size: 28px;
  margin-top: 20px;
  min-height: 60px;
}

.small {
  font-size: 13px;
  opacity: 0.7;
}

.toggle {
  position: absolute;
  top: 15px;
  right: 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌓</div>

<div class="card">

<h2>⏱ 1 Second Challenge</h2>
<p class="small">tap twice → hit exactly 1.000s</p>

<button class="primary" onclick="tap()">START / STOP</button>

<div id="result"></div>
<div id="actions"></div>

<p class="small" id="best"></p>

</div>

<script>
let startTime = 0;
let running = false;
let best = localStorage.getItem("best");

updateUI();

function toggleTheme() {
  document.body.classList.toggle("light");
}

function tap() {
  if (!running) {
    startTime = Date.now();
    running = true;
    setResult("Go...");
  } else {
    let diff = (Date.now() - startTime) / 1000;
    running = false;
    evaluate(diff);
  }
}

function evaluate(diff) {
  let rounded = diff.toFixed(3);
  let distance = Math.abs(1 - rounded).toFixed(3);

  let message = `You: ${rounded}s\n`;

  if (rounded === "1.000") {
    message += "🔥 PERFECT";
    launchConfetti();
  } else if (distance <= 0.01) {
    message += "😭 SO CLOSE";
  } else if (distance <= 0.02) {
    message += "😳 CLOSE";
  } else if (distance <= 0.05) {
    message += "👍 GOOD";
  } else {
    message += "keep trying";
  }

  message += `\n${distance}s away`;

  if (!best || Math.abs(1-rounded) < Math.abs(1-best)) {
    best = rounded;
    localStorage.setItem("best", best);
  }

  setResult(message);

  document.getElementById("actions").innerHTML = `
    <button class="secondary" onclick="share('${rounded}')">Share</button>
    <button class="primary" onclick="tap()">you're close… try again</button>
  `;

  updateUI();
}

function share(score) {
  let text = `${score}s 😳

can you beat this?
${location.href}`;

  if (navigator.share) {
    navigator.share({ text });
  } else {
    navigator.clipboard.writeText(text);
    alert("Copied!");
  }
}

function updateUI() {
  document.getElementById("best").innerText =
    best ? "🏆 Best: " + best + "s" : "";
}

function setResult(text) {
  document.getElementById("result").innerText = text;
}

/* SIMPLE CONFETTI */
function launchConfetti() {
  const confetti = document.createElement("div");
  confetti.innerHTML = "🎉🎉🎉";
  confetti.style.position = "fixed";
  confetti.style.top = "20%";
  confetti.style.left = "50%";
  confetti.style.transform = "translateX(-50%)";
  confetti.style.fontSize = "40px";
  document.body.appendChild(confetti);

  setTimeout(() => confetti.remove(), 1500);
}
</script>

</body>
</html>
